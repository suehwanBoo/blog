name: Auto PR

on:
  push:
    branches:
      - "feat/**"
      - "chore/**"
      - "fix/**"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-or-update-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch main
        run: git fetch --no-tags origin main

      - name: Prepare PR context
        id: pr-context
        env:
          MAX_CHANGED_FILES: 20
          MAX_CHANGED_LINES: 800
        run: |
          set -euo pipefail

          changed_files="$(git diff --name-only origin/main...HEAD | wc -l | tr -d ' ')"
          changed_lines="$(
            git diff --numstat origin/main...HEAD |
            awk '{
              if ($1 ~ /^[0-9]+$/) added += $1;
              if ($2 ~ /^[0-9]+$/) deleted += $2;
            } END { print added + deleted + 0 }'
          )"

          {
            echo "changed_files=$changed_files"
            echo "changed_lines=$changed_lines"
          } >> "$GITHUB_OUTPUT"

          if [ "$changed_files" -gt "$MAX_CHANGED_FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=Changed file count ($changed_files) exceeds limit ($MAX_CHANGED_FILES)." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$changed_lines" -gt "$MAX_CHANGED_LINES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=Changed line count ($changed_lines) exceeds limit ($MAX_CHANGED_LINES)." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

          {
            echo "# Diff Summary"
            echo
            echo "Changed files: $changed_files"
            echo "Changed lines: $changed_lines"
            echo
            echo "## git diff --stat origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx'"
            git diff --stat origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' || true
            echo
            echo "## git diff --name-status origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx'"
            git diff --name-status origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' || true
          } > pr-context.md

      - name: Skip large PR
        if: steps.pr-context.outputs.skip == 'true'
        run: echo "${{ steps.pr-context.outputs.skip_reason }}"

      - name: Generate PR title and body
        if: steps.pr-context.outputs.skip == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from pathlib import Path

          api_key = os.environ["OPENAI_API_KEY"]
          model = os.environ.get("OPENAI_MODEL", "gpt-4.1-mini")
          pr_context = Path("pr-context.md").read_text(encoding="utf-8").strip()

          prompt = f"""You are writing a pull request title and body for this repository.

          IMPORTANT:
          - Write the entire output in Korean.
          - Do NOT mix English except for code, file names, or technical identifiers.
          - Section headers (Summary, Why, Changes, Test Plan) must remain in English.

          Analyze only this prepared summary of the current branch compared with origin/main.
          Use only the prepared summary below as your source of truth.
          Do not ask for or rely on full git diff output.
          The workflow already skipped this task if changed files exceeded 20 or changed lines exceeded 800.

          Write only facts that are directly visible from the prepared summary.
          Do not infer intent, product impact, test results, or manual verification that is not visible in the summary.
          If the reason for the change is not directly visible from the summary, write "Not visible from diff" in the Why section.
          If tests or verification are not visible in the summary, write "Not verified by automation" in the Test Plan.
          Keep the output concise. Do not exceed 200 words.

          The output format must be exactly:

          TITLE:
          <concise PR title>

          BODY:
          ## Summary
          - key changes

          ## Why
          - reason for the change

          ## Changes
          - main implementation details

          ## Test Plan
          - tests or manual verification confirmed from the summary
          - if unavailable, write "Not verified by automation"

          Prepared summary:
          {pr_context}
          """

          payload = {
              "model": model,
              "input": prompt,
              "max_output_tokens": 500,
              "text": {"format": {"type": "text"}},
          }

          request = urllib.request.Request(
              "https://api.openai.com/v1/responses",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(request, timeout=60) as response:
                  data = json.loads(response.read().decode("utf-8"))
          except urllib.error.HTTPError as error:
              body = error.read().decode("utf-8", errors="replace")
              raise SystemExit(f"OpenAI API request failed: {error.code} {body}")

          texts = []
          for item in data.get("output", []):
              for content in item.get("content", []):
                  if content.get("type") == "output_text":
                      texts.append(content.get("text", ""))

          output = "\n".join(texts).strip()
          if not output:
              raise SystemExit(f"OpenAI API returned no output text: {json.dumps(data)[:1000]}")

          Path("codex-pr-draft.txt").write_text(output + "\n", encoding="utf-8")
          PY

      - name: Parse generated PR draft
        if: steps.pr-context.outputs.skip == 'false'
        run: |
          set -euo pipefail

          python3 <<'PY'
          import re
          from pathlib import Path

          output = Path("codex-pr-draft.txt").read_text(encoding="utf-8").strip()
          match = re.search(r"^TITLE:\s*\n(?P<title>.+?)\n\s*BODY:\s*\n(?P<body>.+)\s*$", output, re.S | re.M)

          if not match:
              raise SystemExit("Generated PR draft did not match the required TITLE/BODY format.")

          title = match.group("title").strip()
          body = match.group("body").strip()

          if not title:
              raise SystemExit("Generated PR title is empty.")

          if not body:
              raise SystemExit("Generated PR body is empty.")

          Path("pr-title.txt").write_text(title + "\n", encoding="utf-8")
          Path("pr-body.md").write_text(body + "\n", encoding="utf-8")
          PY

      - name: Create or update pull request
        if: steps.pr-context.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          title="$(cat pr-title.txt)"
          existing_pr="$(gh pr list --head "$BRANCH_NAME" --base main --state open --json number --jq '.[0].number')"

          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" --title "$title" --body-file pr-body.md
          else
            gh pr create --base main --head "$BRANCH_NAME" --title "$title" --body-file pr-body.md
          fi
